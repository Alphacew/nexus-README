name: Continuous Documentation Sync

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md' # Avoid infinite recursive workflow loops

permissions:
  contents: write # Essential for allowing the action bot to push updates back

jobs:
  synchronize-documentation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase Target
        uses: actions/checkout@v4

      - name: Run Nexus Readme Core Sync
        uses: your-username/nexus-readme@v1 # Maps directly to your public repository release tag
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          exclude: 'target,node_modules,dist,build,public'
